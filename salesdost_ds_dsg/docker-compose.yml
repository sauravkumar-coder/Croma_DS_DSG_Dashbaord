services:

  backend:
    build:
      context: ./salesdost_ds_dsg/backend
    restart: unless-stopped
    ports:
      - "8000:8000"          # optional: expose for direct API access / debugging
    environment:
      - MONGO_URI=${MONGO_URI:-}
      - DATABASE_NAME=${DATABASE_NAME:-ds_dsg_tracker}
      - BRAND_ID=${BRAND_ID:-brand_007}
      - BRAND_USES_DAILY_SALES=${BRAND_USES_DAILY_SALES:-true}
      - USE_MOCK_DATA=${USE_MOCK_DATA:-true}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ALLOWED_ORIGINS=*
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./salesdost_ds_dsg/frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
