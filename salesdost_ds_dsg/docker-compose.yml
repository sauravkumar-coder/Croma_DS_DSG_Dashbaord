version: '3.8'

services:
  backend:
    build: ./backend
    container_name: samsung-dashboard-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    environment:
      # Direct connection parameter is important for SSH tunnels / replica sets
      - MONGO_URI=mongodb://host.docker.internal:27018/zoppertrack?directConnection=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build: ./frontend
    container_name: samsung-dashboard-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
