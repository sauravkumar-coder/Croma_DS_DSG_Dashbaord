server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Match /analytics/samsung/api/ and rewrite to /api/ for the backend
    location /analytics/samsung/api/ {
        rewrite            ^/analytics/samsung/api/(.*)$ /api/$1 break;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase limits to support large file uploads (e.g. detailed monthly targets/sales spreadsheets)
        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — let React Router handle all other paths under /analytics/samsung/
    location /analytics/samsung/ {
        try_files $uri $uri/ /analytics/samsung/index.html;
    }
}
